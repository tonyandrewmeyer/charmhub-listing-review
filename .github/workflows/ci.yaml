name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

permissions: {}

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run linting and static type checking
        run: tox -e lint

  unit:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run unit tests
        run: tox -e unit

  define-spread-matrix:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      suites: ${{ steps.suites.outputs.suites }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install spread
        run: go install github.com/snapcore/spread/cmd/spread@latest

      - name: Generate matrix list
        id: suites
        run: |
          list="$(spread -list github-ci \
            | sed 's|github-ci:ubuntu-24.04:tests/spread/||g' \
            | jq -r -ncR '[inputs | select(length>0)]')"

          echo "suites=$list"
          echo "suites=$list" >> "$GITHUB_OUTPUT"

  integration:
    name: integration (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: define-spread-matrix
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJSON(needs.define-spread-matrix.outputs.suites) }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@5a095e7a2014a4212f075830d4f7277575a9d098  # v7.3.1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Install spread
        run: go install github.com/snapcore/spread/cmd/spread@latest

      - name: Run integration tests
        env:
          SUITE: ${{ matrix.suite }}
        run: spread -v "github-ci:ubuntu-24.04:tests/spread/$SUITE"
