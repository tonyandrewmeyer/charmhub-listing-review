name: Test Listing Request
description: Test version of the listing request template.
labels:
  - listing-request
body:
  - type: input
    id: Name
    attributes:
      label: Charm name
      description: "What is the name of the charm, as it appears on Charmhub?"
      placeholder: myworkload-k8s
    validations:
      required: true

  - type: textarea
    id: Demo
    attributes:
      label: Demo
      description: "Please provide a link to a demo video, or instructions on how to set up a demo over a call, or instructions on installing and trying out the charm via a tutorial."
      placeholder: "https://www.youtube.com/watch?v=example"
    validations:
      required: true

  - type: input
    id: Repository-Link
    attributes:
      label: "Project Repository"
      description: "Please provide the link to the charm's source code repository."
    validations:
      required: true

  - type: input
    id: Charm-Directory
    attributes:
      label: "Charm Directory"
      description: "For repos with more than one charm: the relative path to the charm directory within the repository (e.g. charms/my-charm). Leave empty if the charm is at the repository root."
      placeholder: "charms/my-charm"
    validations:
      required: false

  - type: input
    id: CI-Linting
    attributes:
      label: "CI Linting"
      description: "Please provide the link to the charm's CI workflow for linting and style checks."
    validations:
      required: true

  - type: input
    id: CI-Release
    attributes:
      label: "CI Release"
      description: "Please provide the link to the charm's CI workflow for publishing to Charmhub."
    validations:
      required: true

  - type: input
    id: CI-Integration
    attributes:
      label: "CI Integration Tests"
      description: "Please provide the link to the charm's CI workflow for integration tests."
    validations:
      required: true

  - type: input
    id: Documentation-Link
    attributes:
      label: "Documentation Link"
      description: "Please provide the link to the charm's documentation."
    validations:
      required: true

  - type: input
    id: Default-Branch
    attributes:
      label: "Default Branch"
      description: "If the review should not be against the default branch, specify the correct branch here. Leave blank to use the default branch (typically 'main')."
      placeholder: "26.04"
    validations:
      required: false
