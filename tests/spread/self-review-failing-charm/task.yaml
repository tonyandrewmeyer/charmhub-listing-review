summary: Self-review correctly identifies failures in a badly formed charm
systems:
  - ubuntu-24.04

execute: |
  pushd "${SPREAD_PATH}/${SPREAD_TASK}"

  # Create a failing test charm fixture.
  CHARM_DIR=$(mktemp -d)
  bash "$SPREAD_PATH"/tests/spread/lib/create-test-charm.sh "$CHARM_DIR" failing

  # Run self-review against the badly formed charm.
  output=$(uv run --directory "$SPREAD_PATH" \
    self-review \
      --charm-name "Bad_Charm_Name" \
      --repository "file://$CHARM_DIR" 2>&1) || true

  echo "$output"

  # Should report 0 passed and multiple failures.
  echo "$output" | MATCH "0 passed"
  echo "$output" | MATCH "[0-9]+ failed"

  # Icon should fail (no icon.svg).
  echo "$output" | MATCH "❌.*icon"

  # Lock file should fail.
  echo "$output" | MATCH "❌.*lock file|❌.*committed to version control"

  # pyproject requires-python should fail.
  echo "$output" | MATCH "❌.*requires-python"

restore: |
  rm -rf "${CHARM_DIR:-}" 2>/dev/null || true
