summary: Self-review with a real Canonical inference snap (gemma3)
systems:
  - ubuntu-24.04

execute: |
  pushd "${SPREAD_PATH}/${SPREAD_TASK}"

  # Install the gemma3 inference snap.
  snap install gemma3 --beta
  gemma3 status

  # Wait for the inference API to become ready (the model is large and may
  # take 5-10 minutes to load on a standard CI runner without a GPU).
  # Probe the same ports and paths that the snap backend auto-discovers.
  echo "Waiting for gemma3 API to become ready..."
  API_READY=0
  for i in $(seq 1 300); do
    for port in 8326 8327 8328 8329 8330; do
      for base in /v3 /v1; do
        if curl -sf "http://127.0.0.1:${port}${base}/models" >/dev/null 2>&1; then
          echo "API ready on port ${port}${base} after ~$((i * 2))s"
          API_READY=1
          break 3
        fi
      done
    done
    if [ $((i % 30)) -eq 0 ]; then
      echo "Still waiting after ~$((i * 2))s..."
      gemma3 status || true
    fi
    sleep 2
  done

  # Verify the API is actually responding before continuing.
  if [ "$API_READY" -ne 1 ]; then
    echo "ERROR: gemma3 API did not become ready within 10 minutes"
    gemma3 status || true
    exit 1
  fi

  # Create a passing test charm fixture.
  CHARM_DIR=$(mktemp -d)
  bash "$SPREAD_PATH"/tests/spread/lib/create-test-charm.sh "$CHARM_DIR" passing

  # Add a Python source file so the code review has something to analyse.
  mkdir -p "$CHARM_DIR/src"
  cat > "$CHARM_DIR/src/charm.py" << 'PYEOF'
  import ops

  class TestCharm(ops.CharmBase):
      def __init__(self, *args):
          super().__init__(*args)
          self.framework.observe(self.on.install, self._on_install)

      def _on_install(self, event):
          self.unit.status = ops.ActiveStatus()
  PYEOF
  cd "$CHARM_DIR" && git add -A && git commit -m "Add charm source" --quiet
  cd -

  # Run self-review with the real snap backend and code review enabled.
  output=$(uv run --directory "$SPREAD_PATH" \
    self-review \
      --charm-name test-charm \
      --repository "file://$CHARM_DIR" \
      --ai-backend snap \
      --code-review 2>&1) || true

  echo "$output"

  # File-based checks should still pass.
  echo "$output" | MATCH "✅.*icon"

  # The progress line should be present.
  echo "$output" | MATCH "Progress:.*passed"

  # The AI warning should appear since we got AI output.
  echo "$output" | MATCH "AI output is a suggestion only"

restore: |
  rm -rf "${CHARM_DIR:-}" 2>/dev/null || true
  snap remove gemma3 2>/dev/null || true
